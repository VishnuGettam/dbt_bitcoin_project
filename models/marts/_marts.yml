version: 2

models:
    - name: whale_alert
      latest_version: 2
      config:
        contract:
          enforced: true
         
      columns:      
        - name: f_address
          data_type: varchar         
          tests:
            - assert_valid_btc_address
        - name: total_sent
          data_type: float
        - name: total_transactions
          data_type: NUMBER(18,0)
        - name: total_sent_usd
          data_type: float
      
      versions:
        - v: 1
          defined_in: whale_alert_v1
          config:
            alias: vw_whale_alert_v1
            enabled: false
          deprecation_date: 2026-12-31
          
          
        - v: 2
          defined_in: whale_alert_v2
          config:
            alias: vw_whale_alert_v2
          columns:
            - include: all
              exclude: [total_sent_usd]
          
               
           

    - name: bitcoin
      tests:
        - dbt_utils.equal_rowcount:
            compare_model: ref('bitcoin_stg')
      columns:
        - name: hash_key
          description: 'Hash key of the bitcoin block'
          tests:
            - not_null
            - unique
    
    
   
exposures:

  - name: Bitcoin Whale Alert Dashboard
    label: Whale Alert Dashboard 
    type: dashboard
    maturity: high
    url: https://datastudio.google.com/reporting/624b2006-cb37-462d-8917-51fdc95018bb
    description: >
      Bitcoin whale alert reports

    depends_on:
      - ref("whale_alert",v=2)

    owner:
      name: VG
      email: vishnugettam2024@gmail.com