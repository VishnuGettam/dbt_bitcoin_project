version: 2

sources:
  - name: bitcoin_stg
    database: "{{ env_var('SNOWFLAKE_DATABASE') }}"    
    schema: "{{ env_var('SNOWFLAKE_RAW_SCHEMA') }}"
    
    tables:
      - name: tblbitcoin_stg_raw
        description: 'Bitcoin blocks data'
        # The loaded_at_field is used by dbt to determine the freshness of the data in this source. 
        # It should be a timestamp field that indicates when the data was last updated.
        config:
          loaded_at_field: block_timestamp         
          freshness:
            warn_after:
              count: 1
              period: hour
            error_after:
              count: 2
              period: hour


models:
  - name: bitcoin_stg
    description: 'Staging models for Bitcoin data'
    columns:
      - name: hash_key
        description: 'The number of the block in the blockchain'
        tests:
          - not_null
          - unique