name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  dbt-run:
    runs-on: ubuntu-latest
    environment: dbt_bitcoin

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_RAW_SCHEMA: ${{ secrets.SNOWFLAKE_RAW_SCHEMA }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.8 dbt-snowflake==1.11.4

      - name: Set up dbt profile and private key
        run: |
          mkdir -p ~/.dbt

          # ✅ Generate profiles.yml dynamically using env vars
          cat > ~/.dbt/profiles.yml << EOF
          dbt_bitcoin_project:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                private_key_path: /home/runner/.dbt/rsa_key
                authenticator: jwt
                database: ${SNOWFLAKE_DATABASE}
                role: accountadmin
                schema: bitcoin_dev_schema
                warehouse: compute_wh
                threads: 6
          EOF

          # ✅ Write private key
          echo "$DBT_PRIVATE_KEY" > ~/.dbt/rsa_key
          chmod 600 ~/.dbt/rsa_key
        env:
          DBT_PRIVATE_KEY: ${{ secrets.DBT_PRIVATE_KEY }}

      - name: Install dbt deps
        run: dbt deps

      - name: Run dbt debug
        run: dbt debug

      - name: Run dbt
        run: dbt run